<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
    AI Resume Analyzer Pro
</title>

<link rel="stylesheet"
      href="/static/style.css">

</head>

<body>

<div class="container">

<div class="header">

    <h1>
        🚀 AI Resume Analyzer Pro
    </h1>

    <p>
        FastAPI + MongoDB + Resume Screening
    </p>

</div>

<form
    action="/analyze"
    method="post"
    enctype="multipart/form-data">

    <div class="card">

        <h2>
            Upload Resumes
        </h2>

        <input
            type="file"
            name="resumes"
            multiple
            accept=".pdf"
            required>

    </div>

    <div class="card">

        <h2>
            Job Description
        </h2>

        <textarea
            name="job_description"
            placeholder="Paste Job Description Here..."
            required></textarea>

    </div>

    <div class="center">

        <button type="submit">

            Analyze Resumes

        </button>

    </div>

</form>

<div id="results"></div>


<script src="/static/script.js"></script>

</body>

</html>
